<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="ESE favicon">
  <defs>
    <linearGradient id="bg" x1="20" y1="16" x2="108" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="stroke" x1="18" y1="18" x2="110" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#60a5fa" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="108" height="108" rx="26" fill="url(#bg)"/>
  <rect x="10.75" y="10.75" width="106.5" height="106.5" rx="25.25" fill="none" stroke="url(#stroke)" stroke-opacity="0.55" stroke-width="1.5"/>

  <text
    x="64"
    y="77"
    text-anchor="middle"
    font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif"
    font-size="31"
    font-weight="700"
    letter-spacing="3"
    fill="#f8fbff"
    filter="url(#textGlow)"
  >ESE</text>
